<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkMode — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Fira Code', monospace;
    -webkit-user-select: none;
    -moz-user-select: none;
    user-select: none;
    -webkit-user-drag: none;
  }

  ::-webkit-scrollbar { display: none; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }

  #splash {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    cursor: pointer;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }

  #splash.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .splash-text {
    color: #fff;
    font-size: clamp(0.85rem, 2vw, 1.1rem);
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: lowercase;
    opacity: 0;
    animation: fadeInText 1.4s ease forwards 0.5s;
  }

  .splash-text span {
    color: #7c6aff;
  }

  @keyframes fadeInText {
    0% { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  #site {
    position: fixed;
    inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    opacity: 0;
    transition: opacity 0.9s ease;
  }

  #site::-webkit-scrollbar { display: none; }

  #site.visible { opacity: 1; }

  .bg-layer {
    position: fixed;
    inset: 0;
    background: url('https://i.pinimg.com/originals/6b/4a/f9/6b4af9a7e6dd84cb06a93218b2578c6e.gif') center/cover no-repeat;
    z-index: 0;
  }

  .bg-blur {
    position: fixed;
    inset: 0;
    backdrop-filter: blur(12px) brightness(0.35);
    -webkit-backdrop-filter: blur(12px) brightness(0.35);
    z-index: 1;
  }

  .page-content {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
    gap: 20px;
  }

  .card {
    background: rgba(10, 10, 15, 0.72);
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 20px;
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    width: 100%;
    max-width: 420px;
    padding: 36px 32px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .avatar-wrap {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: 2px solid rgba(124, 106, 255, 0.5);
    overflow: hidden;
    flex-shrink: 0;
  }

  .avatar-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
  }

  .nick {
    margin-top: 14px;
    color: #fff;
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-align: center;
  }

  .desc {
    margin-top: 7px;
    color: rgba(200, 200, 220, 0.65);
    font-size: 0.78rem;
    font-weight: 300;
    line-height: 1.6;
    text-align: center;
    letter-spacing: 0.02em;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: rgba(255, 255, 255, 0.08);
    margin: 24px 0;
  }

  .social-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .social-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: rgba(210, 210, 230, 0.75);
    font-size: 1.1rem;
    text-decoration: none;
    transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, transform 0.18s ease;
  }

  .social-btn:hover {
    background: rgba(124, 106, 255, 0.18);
    border-color: rgba(124, 106, 255, 0.4);
    color: #fff;
    transform: translateY(-2px);
  }

  .discord-card {
    background: rgba(10, 10, 15, 0.72);
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 20px;
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    width: 100%;
    max-width: 420px;
    overflow: hidden;
  }

  .dc-banner {
    width: 100%;
    height: 110px;
    object-fit: cover;
    display: block;
    pointer-events: none;
    background: #1a1a2e;
  }

  .dc-body {
    padding: 0 24px 26px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0;
  }

  .dc-icon-wrap {
    margin-top: -32px;
    width: 64px;
    height: 64px;
    border-radius: 14px;
    border: 3px solid rgba(10, 10, 15, 0.9);
    overflow: hidden;
    flex-shrink: 0;
  }

  .dc-icon-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
  }

  .dc-name {
    margin-top: 12px;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.03em;
  }

  .dc-desc {
    margin-top: 6px;
    color: rgba(190, 190, 210, 0.6);
    font-size: 0.73rem;
    font-weight: 300;
    line-height: 1.6;
    letter-spacing: 0.01em;
  }

  .dc-stats {
    margin-top: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }

  .dc-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .dc-stat-val {
    color: #fff;
    font-size: 0.88rem;
    font-weight: 600;
  }

  .dc-stat-label {
    color: rgba(180, 180, 200, 0.5);
    font-size: 0.65rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .dc-stat-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #3ba55d;
    margin-right: 4px;
    vertical-align: middle;
  }

  .dc-join-btn {
    margin-top: 20px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 10px 28px;
    background: #5865f2;
    color: #fff;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-radius: 10px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.18s ease;
  }

  .dc-join-btn:hover {
    background: #4752c4;
    transform: translateY(-2px);
  }

  #music-player {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 9px;
    background: rgba(10, 10, 15, 0.78);
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 12px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 8px 13px 8px 10px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  #music-player.visible { opacity: 1; }

  .mp-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(210, 210, 230, 0.8);
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s ease;
    padding: 0;
  }

  .mp-btn:hover { color: #fff; }

  .mp-info {
    display: flex;
    flex-direction: column;
    gap: 1px;
    max-width: 130px;
  }

  .mp-title {
    color: rgba(230, 230, 250, 0.9);
    font-size: 0.65rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.02em;
  }

  .mp-bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 10px;
  }

  .mp-bar {
    width: 2px;
    background: #7c6aff;
    border-radius: 1px;
    height: 3px;
    transition: height 0.1s ease;
  }

  .mp-bars.playing .mp-bar:nth-child(1) { animation: bar1 0.8s ease-in-out infinite; }
  .mp-bars.playing .mp-bar:nth-child(2) { animation: bar2 0.9s ease-in-out infinite 0.15s; }
  .mp-bars.playing .mp-bar:nth-child(3) { animation: bar3 0.7s ease-in-out infinite 0.05s; }
  .mp-bars.playing .mp-bar:nth-child(4) { animation: bar1 0.85s ease-in-out infinite 0.2s; }

  @keyframes bar1 { 0%,100%{height:3px} 50%{height:10px} }
  @keyframes bar2 { 0%,100%{height:6px} 50%{height:3px} }
  @keyframes bar3 { 0%,100%{height:9px} 50%{height:4px} }

  .skeleton {
    background: rgba(255,255,255,0.06);
    border-radius: 6px;
    animation: skPulse 1.5s ease-in-out infinite;
  }

  @keyframes skPulse { 0%,100%{opacity:0.6} 50%{opacity:1} }

  .sk-text { height: 12px; width: 80%; margin: 4px auto; }
  .sk-text-sm { height: 10px; width: 60%; margin: 3px auto; }

  @media (max-width: 480px) {
    .card, .discord-card { max-width: 100%; border-radius: 16px; }
    .card { padding: 28px 20px 24px; }
  }
</style>
</head>
<body>

<div id="splash">
  <p class="splash-text">clique para <span>entrar</span></p>
</div>

<div id="site">
  <div class="bg-layer"></div>
  <div class="bg-blur"></div>

  <div id="music-player">
    <button class="mp-btn" id="mp-toggle"><i class="bi bi-pause-fill" id="mp-icon"></i></button>
    <div class="mp-info">
      <span class="mp-title" id="mp-title">Carregando...</span>
      <div class="mp-bars playing" id="mp-bars">
        <div class="mp-bar"></div>
        <div class="mp-bar"></div>
        <div class="mp-bar"></div>
        <div class="mp-bar"></div>
      </div>
    </div>
  </div>

  <audio id="audio" loop>
    <source src="https://ia800905.us.archive.org/19/items/FREE_background_music_dhalius/backsound.mp3" type="audio/mpeg">
  </audio>

  <div class="page-content">

    <div class="card" data-aos="fade-up" data-aos-duration="700">
      <div class="avatar-wrap">
        <img id="user-avatar" src="" alt="Avatar">
      </div>
      <p class="nick" id="user-nick"><span class="skeleton sk-text" style="display:inline-block;width:100px;height:16px;"></span></p>
      <p class="desc">desenvolvedor • entusiasta de segurança • criador de conteúdo</p>

      <div class="divider"></div>

      <div class="social-row">
        <a class="social-btn" href="https://discord.com/users/1080175803024814142" target="_blank" rel="noopener" title="Discord"><i class="bi bi-discord"></i></a>
        <a class="social-btn" href="https://github.com/" target="_blank" rel="noopener" title="GitHub"><i class="bi bi-github"></i></a>
        <a class="social-btn" href="https://store.steampowered.com/" target="_blank" rel="noopener" title="Steam"><i class="bi bi-steam"></i></a>
        <a class="social-btn" href="https://twitter.com/" target="_blank" rel="noopener" title="Twitter / X"><i class="bi bi-twitter-x"></i></a>
        <a class="social-btn" href="https://youtube.com/" target="_blank" rel="noopener" title="YouTube"><i class="bi bi-youtube"></i></a>
        <a class="social-btn" href="mailto:dark@email.com" title="Email"><i class="bi bi-envelope"></i></a>
      </div>

      <div class="divider"></div>

      <div class="discord-card" id="dc-card" style="width:100%;max-width:100%;border:none;border-radius:14px;">
        <div style="width:100%;height:110px;background:rgba(255,255,255,0.04);border-radius:14px 14px 0 0;" id="dc-banner-wrap">
          <img id="dc-banner" class="dc-banner" style="border-radius:14px 14px 0 0;" src="" alt="" onerror="this.style.display='none'">
        </div>
        <div class="dc-body">
          <div class="dc-icon-wrap">
            <img id="dc-icon" src="" alt="Server Icon">
          </div>
          <p class="dc-name" id="dc-name"><span class="skeleton sk-text" style="display:inline-block;width:120px;height:14px;"></span></p>
          <p class="dc-desc" id="dc-desc"><span class="skeleton sk-text-sm" style="display:inline-block;width:90%;height:10px;"></span></p>
          <div class="dc-stats">
            <div class="dc-stat">
              <span class="dc-stat-val" id="dc-members">—</span>
              <span class="dc-stat-label">membros</span>
            </div>
            <div class="dc-stat">
              <span class="dc-stat-val" id="dc-online"><span class="dc-stat-dot"></span><span id="dc-online-val">—</span></span>
              <span class="dc-stat-label">online</span>
            </div>
          </div>
          <a class="dc-join-btn" id="dc-join" href="https://discord.gg/platformdestroyer" target="_blank" rel="noopener">
            <i class="bi bi-discord"></i> Entrar no Servidor
          </a>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({ once: true, offset: 20 });

  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('dragstart', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    const blocked = (
      e.key === 'F12' ||
      (e.ctrlKey && ['u','U','s','S','a','A','c','C','p','P','i','I','j','J'].includes(e.key)) ||
      (e.ctrlKey && e.shiftKey && ['i','I','j','J','c','C','k','K'].includes(e.key))
    );
    if (blocked) e.preventDefault();
  });

  const splash = document.getElementById('splash');
  const site = document.getElementById('site');
  const audio = document.getElementById('audio');
  const mpToggle = document.getElementById('mp-toggle');
  const mpIcon = document.getElementById('mp-icon');
  const mpBars = document.getElementById('mp-bars');
  const mpPlayer = document.getElementById('music-player');

  splash.addEventListener('click', () => {
    splash.classList.add('hidden');
    site.classList.add('visible');
    audio.volume = 0.35;
    audio.play().catch(() => {});
    setTimeout(() => mpPlayer.classList.add('visible'), 900);
    loadData();
  });

  mpToggle.addEventListener('click', () => {
    if (audio.paused) {
      audio.play();
      mpIcon.className = 'bi bi-pause-fill';
      mpBars.classList.add('playing');
    } else {
      audio.pause();
      mpIcon.className = 'bi bi-play-fill';
      mpBars.classList.remove('playing');
    }
  });

  document.getElementById('mp-title').textContent = 'Lo-fi Chill';

  function formatCount(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1).replace('.0', '') + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1).replace('.0', '') + 'K';
    return n.toLocaleString('pt-BR');
  }

  async function loadData() {
    try {
      const [userRes, guildRes] = await Promise.all([
        fetch('https://darkscrapper.squareweb.app/discord/user/1080175803024814142'),
        fetch('https://discord.com/api/v9/invites/platformdestroyer?with_counts=true')
      ]);
      const user = await userRes.json();
      const guild = await guildRes.json();

      const avatarEl = document.getElementById('user-avatar');
      avatarEl.src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.webp?size=256`;

      const nickEl = document.getElementById('user-nick');
      nickEl.innerHTML = '';
      nickEl.textContent = user.global_name || user.username;

      const guildData = guild.guild || {};
      const profile = guild.profile || {};

      const iconHash = guildData.icon || profile.icon_hash;
      const guildId = guildData.id || guild.guild_id;
      const bannerHash = guildData.banner;

      if (iconHash && guildId) {
        document.getElementById('dc-icon').src = `https://cdn.discordapp.com/icons/${guildId}/${iconHash}.webp?size=128`;
      }

      if (bannerHash && guildId) {
        const bannerEl = document.getElementById('dc-banner');
        bannerEl.src = `https://cdn.discordapp.com/banners/${guildId}/${bannerHash}.webp?size=600`;
        bannerEl.style.display = 'block';
      }

      const nameEl = document.getElementById('dc-name');
      nameEl.innerHTML = '';
      nameEl.textContent = guildData.name || profile.name || 'Platform Destroyer';

      const descEl = document.getElementById('dc-desc');
      descEl.innerHTML = '';
      descEl.textContent = guildData.description || profile.description || '';

      document.getElementById('dc-members').textContent = formatCount(guild.approximate_member_count || profile.member_count || 0);
      document.getElementById('dc-online-val').textContent = formatCount(guild.approximate_presence_count || profile.online_count || 0);
    } catch (err) {
      console.warn('Failed to load data', err);
    }
  }
</script>
</body>
</html>
