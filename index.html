<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  user-select:none;
  -webkit-user-select:none;
  -moz-user-select:none;
  -ms-user-select:none
}

html,body{
  height:100%;
  background:#080808
}

body{
  font-family:'Geist Mono',monospace;
  color:#e8e8e8;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:32px 20px;
  gap:14px
}

h1{
  font-size:13px;
  font-weight:400;
  letter-spacing:.25em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.6);
  text-align:center;
  line-height:1.5
}

h1 b{
  color:#60a5fa;
  font-weight:600
}

.btns{
  display:flex;
  gap:8px;
  margin-top:4px;
  align-items:center;
  justify-content:center;
  flex-wrap:wrap
}

.btn{
  padding:11px 24px;
  border-radius:5px;
  font-family:'Geist Mono',monospace;
  font-size:10.5px;
  font-weight:500;
  letter-spacing:.1em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .2s;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border:none;
  outline:none;
  white-space:nowrap;
  min-width:160px
}

.btn-drag{
  border:1px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.65);
  background:none
}

.btn-drag:hover{
  border-color:rgba(59,130,246,0.45);
  color:#60a5fa
}

.btn-copy{
  border:1px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.65);
  background:none
}

.btn-copy:hover{
  border-color:rgba(59,130,246,0.45);
  color:#60a5fa
}

.btn-tutorial{
  border:1px solid rgba(59,130,246,0.6);
  color:#60a5fa;
  background:rgba(59,130,246,0.08);
  margin-top:8px;
  width:auto;
  min-width:160px
}

.btn-tutorial:hover{
  background:rgba(59,130,246,0.15);
  box-shadow:0 0 22px rgba(59,130,246,0.2);
  color:#93c5fd
}

.btn-discord{
  border:1px solid rgba(88,101,242,0.7);
  color:#a5b4fc;
  background:rgba(88,101,242,0.1);
  margin-top:8px;
  min-width:160px;
  display:inline-flex;
  align-items:center;
  gap:6px;
}

.btn-discord:hover{
  background:rgba(88,101,242,0.2);
  box-shadow:0 0 22px rgba(88,101,242,0.25);
  color:#c7d2fe;
}

.divider{
  width:1px;
  height:28px;
  background:rgba(255,255,255,0.1)
}

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  z-index:1000;
  align-items:center;
  justify-content:center;
  padding:20px;
  backdrop-filter:blur(10px);
  overflow-y:auto
}

.modal.active{
  display:flex
}

.modal-content{
  background:#0f0f0f;
  border:1px solid rgba(59,130,246,0.3);
  border-radius:8px;
  padding:32px;
  max-width:900px;
  width:100%;
  max-height:90vh;
  overflow-y:auto;
  position:relative;
  margin:auto
}

.modal-close{
  position:absolute;
  top:16px;
  right:16px;
  background:none;
  border:none;
  color:rgba(255,255,255,0.5);
  font-size:24px;
  cursor:pointer;
  width:32px;
  height:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .2s;
  border-radius:4px;
  z-index:1
}

.modal-close:hover{
  color:#60a5fa;
  background:rgba(59,130,246,0.1)
}

.modal-title{
  font-size:16px;
  font-weight:500;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:#60a5fa;
  margin-bottom:24px;
  text-align:center
}

.video-section{
  margin-bottom:28px
}

.video-section:last-child{
  margin-bottom:0
}

.video-label{
  font-size:11px;
  font-weight:500;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.7);
  margin-bottom:12px;
  text-align:center
}

.video-wrapper{
  position:relative;
  width:100%;
  padding-bottom:56.25%;
  background:#000;
  border-radius:6px;
  overflow:hidden;
  border:1px solid rgba(59,130,246,0.2)
}

.video-wrapper video,
.video-wrapper iframe{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border:none
}

.foot{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  font-size:11px;
  color:rgba(255,255,255,0.35);
  margin-top:6px;
  text-align:center;
  flex-wrap:wrap
}

.foot b{
  color:#60a5fa;
  font-weight:400
}

textarea{
  position:absolute;
  left:-9999px
}

@media (max-width:768px){

  body{
    padding:24px 16px;
    gap:12px
  }

  h1{
    font-size:11px;
    letter-spacing:.2em
  }

  .btns{
    gap:6px;
    width:100%
  }

  .btns .btn{
    flex:1;
    min-width:0
  }

  .btn{
    padding:10px 18px;
    font-size:9.5px
  }

  .divider{
    display:none
  }

  .modal-content{
    padding:24px 16px;
    margin:10px
  }

  .modal-title{
    font-size:14px;
    margin-bottom:20px
  }

  .video-label{
    font-size:10px
  }

  .video-section{
    margin-bottom:20px
  }

  .foot{
    font-size:8px;
    gap:4px
  }

}

@media (max-width:480px){

  h1{
    font-size:10px;
    letter-spacing:.15em
  }

  .btns{
    flex-direction:column;
    width:100%;
    max-width:280px
  }

  .btn{
    width:100%;
    padding:9px 14px;
    font-size:9px
  }

  .btn-tutorial{
    width:100%;
    max-width:280px
  }

}
</style>
</head>

<script>
document.addEventListener('contextmenu', function(e) {
  e.preventDefault();
  return false;
});

document.addEventListener('dragstart', function(e) {
  if (e.target.id !== 'dragBtn') {
    e.preventDefault();
    return false;
  }
});

document.getElementById('dragBtn').addEventListener('click', function(e) {
  e.preventDefault();
  copyCodeDrag();
});

function openModal() {
  document.getElementById('tutorialModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('tutorialModal').classList.remove('active');
  document.body.style.overflow = '';
}

function closeModalOnBackdrop(e) {
  if (e.target.id === 'tutorialModal') {
    closeModal();
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeModal();
  }
});

function copyCode() {
  var textArea = document.getElementById("jscode");

  textArea.style.position = "fixed";
  textArea.style.left = "0";
  textArea.style.top = "0";
  textArea.style.opacity = "0";

  textArea.select();
  textArea.setSelectionRange(0, 99999);

  try {
    document.execCommand("copy");
    feedbackCopy();
  } catch (err) {

    navigator.clipboard.writeText(textArea.value).then(function(){
      feedbackCopy();
    }).catch(function(){
      alert("Erro ao copiar. Copie manualmente.");
    });

  }

  textArea.style.left = "-9999px";
}

function feedbackCopy(){
  var b = document.getElementById("copybtn");
  var originalText = b.innerHTML;

  b.innerHTML = "copiado!";

  setTimeout(function(){
    b.innerHTML = originalText;
  },2000);
}

function copyCodeDrag() {
  var textArea = document.getElementById('jscode');
  navigator.clipboard.writeText(textArea.value).then(function(){
    var b = document.getElementById('dragBtn');
    var originalText = b.innerHTML;
    b.innerHTML = 'copiado!';
    setTimeout(function(){
      b.innerHTML = originalText;
    }, 2000);
  }).catch(function(err) {
    console.error('Erro ao copiar:', err);
    alert('Erro ao copiar. Por favor, tente novamente.');
  });
}

window.addEventListener('DOMContentLoaded', function () {

  var videoCelular = 'https://cdn.discordapp.com/attachments/1080183819572887613/1479459365533647041/Celular.mp4?ex=69ac1d67&is=69aacbe7&hm=83125f55225d1bac1159e207a3c43d9e6569a9c87756066c192dce269cedbafe&';
  var videoPC = 'https://cdn.discordapp.com/attachments/1080183819572887613/1479445586947211367/PC.mp4?ex=69ac1092&is=69aabf12&hm=edd0200fc235e0386f0ee914bd6b0bc84ffd713dab70ef74a454e8740477b138&';


  function loadVideo(url, containerId) {

    if (!url) return;

    var container = document.getElementById(containerId);
    if (!container) return;

    container.innerHTML = '';

    var video = document.createElement('video');

    video.controls = true;
    video.preload = 'metadata';
    video.playsInline = true;

    video.style.width = '100%';
    video.style.height = '100%';
    video.style.borderRadius = '8px';

    var source = document.createElement('source');
    source.src = url;
    source.type = 'video/mp4';

    video.appendChild(source);

    container.appendChild(video);

  }


  if (videoCelular) {
    loadVideo(videoCelular, 'video-celular');
  }

  if (videoPC) {
    loadVideo(videoPC, 'video-pc');
  }

});
</script>
